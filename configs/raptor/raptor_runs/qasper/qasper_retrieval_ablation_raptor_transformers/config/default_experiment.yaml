raptor_run:
  run_name: qasper_retrieval_ablation_raptor_transformers
  output_root: raptor_runs
  dataset:
    split: test
    loader:
      name: qasper
      config_name: default
    selection:
      max_docs: 25
  models:
    embedding:
      provider: contriever
      model: facebook/contriever
      pooling: mean
      normalize: true
      trust_remote_code: true
    summarization:
      provider: transformers
      model: Qwen/Qwen2-0.5B-Instruct
      device_map: auto
      dtype: bfloat16
      trust_remote_code: true
      temperature: 0.0
      top_p: 1.0
    qa:
      provider: transformers
      model: Qwen/Qwen2-0.5B-Instruct
      device_map: auto
      dtype: bfloat16
      trust_remote_code: true
      temperature: 0.6
      top_p: 0.95
      stop:
        - "[END_JSON]"
        - "<|im_end|>"
        - "<|endoftext|>"
  tree_builder:
    max_tokens: 200
    num_layers: 5
    threshold: 0.5
    top_k: 5
    selection_mode: top_k
    summarization_length: 150
    reduction_dimension: 10
  retrieval:
    top_k: 5
    max_tokens: 3500
    collapse_tree: true
    threshold: 0.5
    selection_mode: top_k
  generation:
    max_tokens: 4096
    temperature: 0.6
    top_p: 0.95
    stop:
      - "[END_JSON]"
      - "<|im_end|>"
      - "<|endoftext|>"
  profiling:
    record_resource_usage: true
